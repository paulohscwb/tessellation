<html>
  <head>
    <title>Tessellation</title>
	<meta charset="utf-8">
	<link rel="icon" type="image/png" href="salas/imagens/icone.png">
	<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
	<script src="https://unpkg.com/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>
	<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">
	<script src="nomes.js"></script>
	<link rel="stylesheet" href="nomes.css">
 	<script src="https://unpkg.com/aframe-teleport-controls@0.3.x/dist/aframe-teleport-controls.min.js"></script>
  </head>
  <body>
  <div class="box" style="visibility: hidden;">
		<label for="rangevalue">order: </label><output id="rangevalue">0</output>&nbsp;&nbsp;&nbsp;<input type="range" id="nv" min="0" max="7" step="1" value="0" onchange="rangevalue.value=value; mnivelRA()">
	</div>
<div style='color:#fada99; position: fixed; bottom: 1vh; left:1vw; width:100%; z-index: 1; font-family: Lato; font-size:2.5vh; font-weight:bold; text-shadow:1px 1px 1px royalblue;'>paulohscwb@gmail.com <br> &copy; 2026 Paulo Henrique Siqueira</div>
    <a-scene renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias:true">
		<a-assets>
			<a-mixin id="esfera" geometry="segments-height:20; segments-width:20;" material="color: #8ec; side:double; metalness:0.4; roughness:0.5;"></a-mixin>
			<a-mixin id="ar">
			<a-asset-item id="materialw" src="https://paulohscwb.github.io/polyhedra/platonic/vr/outros/solidos.mtl"></a-asset-item>
		</a-assets>
		
		<a-light type="point" color="yellow" intensity="0.25" position="0 0 0"></a-light>
		<a-entity scale="1.2 1.2 1.2" id="nivel0" visible="false">
			<a-gltf-model src="gltf/GreatDodecahemicosacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="https://paulohscwb.github.io/polyhedra/infinity/vr/outros/GreatDodecahemicosacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-entity scale="0.83 0.83 0.83" id="nivel1" visible="false">
			<a-gltf-model src="gltf/GreatDodecahemidodecacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="https://paulohscwb.github.io/polyhedra/infinity/vr/outros/GreatDodecahemidodecacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-entity scale="1.45 1.45 1.45" id="nivel2" visible="false">
			<a-gltf-model src="gltf/Hexahemioctacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="https://paulohscwb.github.io/polyhedra/infinity/vr/outros/HexahemioctacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
			
		<a-entity scale="0.83 0.83 0.83" id="nivel3">
			<a-gltf-model src="gltf/SmallIcosihemidodecacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="https://paulohscwb.github.io/polyhedra/infinity/vr/outros/SmallIcosihemidodecacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-entity scale="1.9 1.9 1.9" id="nivel4" visible="false">
			<a-gltf-model src="gltf/Tetrahemihexacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="https://paulohscwb.github.io/polyhedra/infinity/vr/outros/tetrahemihexacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-entity scale="1.2 1.2 1.2" id="nivel5" visible="false">
			<a-gltf-model src="gltf/StarGreatDodecahemicosacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="gltf/StarGreatDodecahemicosacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-entity scale="1.45 1.45 1.45" id="nivel6" visible="false">
			<a-gltf-model src="gltf/StarHexahemioctacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="gltf/StarHexahemioctacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-entity scale="1.9 1.9 1.9" id="nivel7" visible="false">
			<a-gltf-model src="gltf/StarTetrahemihexacron2.gltf" scale="0.9985 0.9985 0.9985"></a-gltf-model>
			<a-obj-model mixin="ar" src="gltf/StarTetrahemihexacronL.obj" mtl="#materialw"></a-obj-model>
		</a-entity>
		
		<a-box mixin="piso" class="piso" visible="false" position="0 -1.5 0"></a-box>
		<a-entity id="cameraRig" position="0 0 11">
			<a-entity camera="fov:1; near:0.001;" id="head" orbit-controls="target: 0 0 0; maxPolarAngle: 180; minDistance: 0.5; initialPosition: 435 -435 425; maxDistance: 1500;"></a-entity>
			<a-entity teleport-controls="cameraRig: #cameraRig; collisionEntities: [mixin='piso']; teleportOrigin: #head; button: grip;" hand-controls="hand: right"></a-entity>
		</a-entity>
	  
		<a-light type="ambient" color="white" intensity="0.65"></a-light>
		<a-light type="directional" color="white" intensity="0.6" position="-3 2 1"></a-light>
		<a-light type="directional" color="white" intensity="0.6" position="3 -2 1"></a-light>
		<a-light type="directional" color="white" intensity="0.6" position="-3 -2 -1"></a-light>
		<a-light type="directional" color="white" intensity="0.6" position="3 2 -1"></a-light>

		<a-sky color="#f6fff6"></a-sky>
    </a-scene>
	<div class="box">
		<span class="titulo">Rio de Janeiro sidewalk</span>
		<br><span class="titulo">Calçada do Rio de Janeiro</span>
		<hr><input type="checkbox" id="arestas" checked onclick="marestas()">edges
			<br><select id="url" onchange="nv.value=this.value; mnivelRA()">
			<option value="0">Great Dodecahemicosacron</option>
			<option value="1">Great Dodecahemidodecacron</option>
			<option value="2">Hexahemioctacron</option>
			<option value="3" selected>Small Icosihemidodecacron</option>
			<option value="4">Tetrahemihexacron</option>
			<option value="5">Star Great Dodecahemicosacron</option>
			<option value="6">Star Hexahemioctacron</option>
			<option value="7">Star Tetrahemihexacron</option>
		</select>
	</div>
  </body>
</html>
